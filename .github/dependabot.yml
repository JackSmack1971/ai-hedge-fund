version: 2
updates:
  # Keep GitHub Actions SHA-pinned and up to date (#229).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "ci-cd"
      - "dependencies"

  # Keep Poetry-managed Python dependencies current from the root lockfile.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # Keep the frontend npm lockfile current without mixing it into the Python updates.
  - package-ecosystem: "npm"
    directory: "/app/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "frontend"
      - "dependencies"
